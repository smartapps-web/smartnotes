<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatatPro AI - Personal Note Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .recording { animation: pulse-red 1.5s infinite; color: #ef4444; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <div class="max-w-2xl mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-blue-700 mb-2 flex items-center justify-center gap-3">
                <i class="fas fa-brain"></i> CatatPro AI
            </h1>
            <p class="text-gray-500">Ubah suara pengajian/meeting jadi catatan cerdas otomatis.</p>
        </header>

        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-white">
            <div class="p-6 md:p-8">
                <div class="flex justify-between items-center mb-6">
                    <div id="statusContainer" class="flex items-center gap-2">
                        <div id="statusDot" class="w-3 h-3 rounded-full bg-gray-300"></div>
                        <span id="statusLabel" class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Standby</span>
                    </div>
                    <div class="flex gap-2">
                        <button id="startBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-bold transition-all flex items-center gap-2 shadow-lg shadow-blue-200">
                            <i class="fas fa-play"></i> Mulai
                        </button>
                        <button id="stopBtn" class="bg-slate-800 hover:bg-black text-white px-6 py-2 rounded-full font-bold hidden transition-all flex items-center gap-2">
                            <i class="fas fa-stop"></i> Berhenti
                        </button>
                    </div>
                </div>

                <div class="relative group">
                    <div id="transcriptBox" class="bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 min-h-[250px] max-h-[400px] overflow-y-auto text-gray-700 leading-relaxed mb-6">
                        <p id="placeholderText" class="text-gray-400 italic">Suara yang terdengar akan muncul di sini secara real-time...</p>
                        <span id="finalText" class="inline"></span>
                        <span id="interimText" class="text-blue-400 inline"></span>
                    </div>
                </div>

                <button id="summarizeBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-black py-4 rounded-2xl shadow-xl transition-all flex items-center justify-center gap-3 transform active:scale-95">
                    <i class="fas fa-magic"></i> BUAT RANGKUMAN AI
                </button>
            </div>
        </div>

        <div id="resultArea" class="hidden mt-8 space-y-4">
            <div class="bg-white p-8 rounded-3xl shadow-xl border-t-8 border-blue-600">
                <h3 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-feather-alt text-blue-600"></i> Hasil Catatan Cerdas
                </h3>
                <div id="aiResponse" class="whitespace-pre-wrap text-slate-700 leading-relaxed">
                    </div>
                <hr class="my-6">
                <div class="flex justify-between items-center">
                    <button onclick="copyResult()" class="text-slate-500 hover:text-blue-600 font-medium text-sm flex items-center gap-1">
                        <i class="fas fa-copy"></i> Salin Teks
                    </button>
                    <button onclick="window.print()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm font-bold transition-all">
                        <i class="fas fa-print mr-1"></i> Cetak PDF
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === KONFIGURASI ===
        const API_KEY = "AIzaSyDnRMkhnpUXPOS9azh01iKq1Rj9Dd7qY2k"; 
        // ===================

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const finalText = document.getElementById('finalText');
        const interimText = document.getElementById('interimText');
        const statusLabel = document.getElementById('statusLabel');
        const statusDot = document.getElementById('statusDot');
        const summarizeBtn = document.getElementById('summarizeBtn');
        const aiResponse = document.getElementById('aiResponse');
        const resultArea = document.getElementById('resultArea');
        const placeholderText = document.getElementById('placeholderText');

        let recognition;
        let isManualStop = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'id-ID';

            recognition.onstart = () => {
                isManualStop = false;
                statusLabel.innerText = "Mendengarkan...";
                statusLabel.classList.add('recording');
                statusDot.className = "w-3 h-3 rounded-full bg-red-500 animate-ping";
                startBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
                placeholderText.classList.add('hidden');
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalText.innerText += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                interimText.innerText = interimTranscript;
                
                // Auto scroll ke bawah biar teks terbaru kelihatan
                const box = document.getElementById('transcriptBox');
                box.scrollTop = box.scrollHeight;
            };

            recognition.onend = () => {
                // Fitur Killer: Auto Restart kalau mati sendiri (bukan di-stop user)
                if (!isManualStop) {
                    recognition.start();
                } else {
                    statusLabel.innerText = "Selesai";
                    statusLabel.classList.remove('recording');
                    statusDot.className = "w-3 h-3 rounded-full bg-gray-300";
                    startBtn.classList.remove('hidden');
                    stopBtn.classList.add('hidden');
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech Error:", event.error);
                if(event.error === 'not-allowed') alert("Akses Mic ditolak. Cek setting browser lo, Bro!");
            };

        } else {
            alert("Browser lo nggak support rekam suara. Pakai Chrome terbaru ya!");
        }

        startBtn.onclick = () => {
            finalText.innerText = "";
            interimText.innerText = "";
            recognition.start();
        };

        stopBtn.onclick = () => {
            isManualStop = true;
            recognition.stop();
        };

        // INTEGRASI AI GEMINI
        async function callGemini(fullText) {
            const prompt = `Tolong buatkan ringkasan yang rapi dan sangat informatif dari transkrip suara pengajian/meeting berikut. 
            Buat dalam format:
            - Judul: (Buat judul yang menarik)
            - Poin-Poin Utama: (List hal penting)
            - Penutup/Kesimpulan: (Intisari)
            
            Gunakan bahasa yang enak dibaca. Ini teksnya: ${fullText}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                if (data.error) return "Error API: " + data.error.message;
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                return "Gagal koneksi AI: " + error.message;
            }
        }

        summarizeBtn.onclick = async () => {
            const text = finalText.innerText;
            if (text.length < 15) return alert("Teks masih terlalu pendek, rekam lebih lama lagi!");

            summarizeBtn.disabled = true;
            summarizeBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Lagi Merangkum...`;
            
            const summary = await callGemini(text);
            
            // Tampilkan hasil (Basic Formatting)
            aiResponse.innerText = summary;
            resultArea.classList.remove('hidden');
            resultArea.scrollIntoView({ behavior: 'smooth' });
            
            summarizeBtn.disabled = false;
            summarizeBtn.innerHTML = `<i class="fas fa-magic"></i> BUAT RANGKUMAN AI`;
        };

        function copyResult() {
            navigator.clipboard.writeText(aiResponse.innerText);
            alert("Catatan disalin!");
        }
    </script>
</body>
</html>
