<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatatPro AI - Anti Dobel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <div class="max-w-2xl mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-blue-700 mb-2">🎙️ CatatPro AI</h1>
            <p class="text-gray-500 text-sm">Versi Optimasi Android (Anti-Dobel)</p>
        </header>

        <div class="bg-white rounded-3xl shadow-xl p-6 border border-white">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <div id="statusDot" class="w-3 h-3 rounded-full bg-gray-300"></div>
                    <span id="statusLabel" class="text-xs font-bold text-gray-400 uppercase">Standby</span>
                </div>
                <div class="flex gap-2">
                    <button id="startBtn" class="bg-blue-600 text-white px-5 py-2 rounded-full font-bold shadow-md active:scale-95">Mulai</button>
                    <button id="stopBtn" class="bg-slate-800 text-white px-5 py-2 rounded-full font-bold hidden">Stop</button>
                </div>
            </div>

            <div id="transcriptBox" class="bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 min-h-[300px] max-h-[450px] overflow-y-auto mb-6">
                <div id="contentHolder" class="text-gray-700 leading-relaxed">
                    <p id="placeholder" class="text-gray-400 italic">Klik Mulai untuk mencatat...</p>
                </div>
                <span id="interimText" class="text-blue-400 opacity-60 italic text-sm"></span>
            </div>

            <button id="summarizeBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95">
                <i class="fas fa-magic mr-2"></i> BUAT RANGKUMAN AI
            </button>
        </div>

        <div id="resultArea" class="hidden mt-8">
            <div class="bg-white p-6 rounded-3xl shadow-xl border-t-8 border-blue-600">
                <h3 class="font-bold text-slate-800 mb-4 uppercase text-sm tracking-widest">✨ Hasil Rangkuman AI</h3>
                <div id="aiResponse" class="whitespace-pre-wrap text-slate-700 leading-relaxed text-sm"></div>
                <button onclick="copyResult()" class="mt-6 w-full py-2 bg-slate-100 rounded-xl font-bold text-blue-600 text-sm">Salin Catatan</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyDnRMkhnpUXPOS9azh01iKq1Rj9Dd7qY2k";
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const contentHolder = document.getElementById('contentHolder');
        const interimText = document.getElementById('interimText');
        const statusLabel = document.getElementById('statusLabel');
        const statusDot = document.getElementById('statusDot');
        const summarizeBtn = document.getElementById('summarizeBtn');
        const aiResponse = document.getElementById('aiResponse');
        const resultArea = document.getElementById('resultArea');

        let recognition;
        let isManualStop = false;
        let finalSentences = new Set(); // Menggunakan Set agar teks yang sama persis tidak masuk 2x

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'id-ID';

            recognition.onstart = () => {
                isManualStop = false;
                statusLabel.innerText = "Listening...";
                statusDot.className = "w-3 h-3 rounded-full bg-red-500 animate-pulse";
                startBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    let transcript = event.results[i][0].transcript.trim();
                    if (event.results[i].isFinal) {
                        // FILTER ANTI DOBEL: Hanya masukkan jika kalimat belum ada di daftar
                        if (!finalSentences.has(transcript)) {
                            finalSentences.add(transcript);
                            renderFinal();
                        }
                    } else {
                        interimTranscript = transcript;
                    }
                }
                interimText.innerText = interimTranscript;
            };

            recognition.onend = () => {
                if (!isManualStop) recognition.start();
                else {
                    statusLabel.innerText = "Standby";
                    statusDot.className = "w-3 h-3 rounded-full bg-gray-300";
                    startBtn.classList.remove('hidden');
                    stopBtn.classList.add('hidden');
                }
            };
        }

        function renderFinal() {
            // Tampilkan semua kalimat unik yang sudah ditangkap
            contentHolder.innerHTML = Array.from(finalSentences).join('. ') + '. ';
            const box = document.getElementById('transcriptBox');
            box.scrollTop = box.scrollHeight;
        }

        startBtn.onclick = () => {
            finalSentences.clear();
            contentHolder.innerHTML = "";
            recognition.start();
        };

        stopBtn.onclick = () => {
            isManualStop = true;
            recognition.stop();
        };

        async function callGemini(fullText) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            const prompt = `Tolong rangkum teks rekaman suara ini menjadi catatan poin-poin yang rapi. Teks: ${fullText}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                return "Error: Koneksi ke AI terputus.";
            }
        }

        summarizeBtn.onclick = async () => {
            const text = contentHolder.innerText;
            if (text.length < 10) return alert("Belum ada teks!");
            
            summarizeBtn.disabled = true;
            summarizeBtn.innerText = "Meringkas...";
            
            const res = await callGemini(text);
            aiResponse.innerText = res;
            resultArea.classList.remove('hidden');
            summarizeBtn.disabled = false;
            summarizeBtn.innerText = "BUAT RANGKUMAN AI";
        };

        function copyResult() {
            navigator.clipboard.writeText(aiResponse.innerText);
            alert("Disalin!");
        }
    </script>
</body>
</html>
